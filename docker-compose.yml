services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bella-tavola-api
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME:-Bella Tavola API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_DESCRIPTION: ${APP_DESCRIPTION:-API do restaurante Bella Tavola}
      DEBUG: ${DEBUG:-false}
      MAX_MESAS: ${MAX_MESAS:-20}
      MAX_PESSOAS_POR_MESA: ${MAX_PESSOAS_POR_MESA:-10}
      MODEL_REPO_ID: ${MODEL_REPO_ID:-}
      MODEL_FILENAME: ${MODEL_FILENAME:-model.pkl}
      MODEL_VERSION: ${MODEL_VERSION:-docker-local}
      HF_TOKEN: ${HF_TOKEN:-}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: bella-tavola-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - bella-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    container_name: bella-tavola-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  bella-pg-data:
