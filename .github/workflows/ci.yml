name: CI - Bella Tavola

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "pydantic>=2,<3" pydantic-settings uvicorn
          pip install pytest httpx ruff
          pip install -r requirements.txt

      - name: Cache Hugging Face artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-py311-${{ secrets.MODEL_REPO_ID }}-${{ hashFiles('requirements.txt') }}

      - name: Verify HF_TOKEN secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "import os; assert os.environ.get('HF_TOKEN'), 'HF_TOKEN nao configurado'"

      - name: Lint with Ruff
        run: |
          ruff check main.py config.py database.py model_utils.py models routers tests

      - name: Run API tests
        env:
          MODEL_REPO_ID: ${{ secrets.MODEL_REPO_ID }}
          MODEL_FILENAME: model.pkl
          MODEL_VERSION: ci
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          pytest -q -m "api and not ml"

      - name: Run ML tests
        env:
          MODEL_REPO_ID: ${{ secrets.MODEL_REPO_ID }}
          MODEL_FILENAME: model.pkl
          MODEL_VERSION: ci
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pytest -q -m "ml"

      - name: Validate model integrity
        env:
          MODEL_REPO_ID: ${{ secrets.MODEL_REPO_ID }}
          MODEL_FILENAME: model.pkl
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from model_utils import load_model

          model = load_model(
              repo_id=os.getenv("MODEL_REPO_ID", ""),
              filename=os.getenv("MODEL_FILENAME", "model.pkl"),
              force_download=False,
          )
          sample = [[250.0, 2, 12.5, 3, 1]]
          pred = model.predict(sample)
          proba = model.predict_proba(sample)

          assert len(pred) == 1, "predict deve retornar 1 valor"
          assert len(proba) == 1 and len(proba[0]) == 2, "predict_proba deve retornar vetor binario"
          assert 0.0 <= float(proba[0][1]) <= 1.0, "probabilidade fora do intervalo"
          print("Model integrity check: OK")
          PY

  docker-publish:
    runs-on: ubuntu-latest
    needs: test-and-quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Autenticar no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bella-tavola-api:latest
            ${{ secrets.DOCKER_USERNAME }}/bella-tavola-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
